<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Bác Sĩ - Doctor Booking</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        background-color: #f8f9fc;
        overflow-x: hidden;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #4e73df;
        color: white;
        width: 250px;
      }
      .sidebar a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: bold;
      }
      .sidebar a:hover,
      .sidebar a.active {
        color: white;
        background-color: rgba(255, 255, 255, 0.1);
        border-left: 4px solid #fff;
      }
      .sidebar .logo {
        font-size: 1.2rem;
        font-weight: 900;
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .main-content {
        flex-grow: 1;
        padding: 20px;
      }
    </style>
  </head>

  <body class="d-flex">
    <div class="sidebar d-none d-md-block">
      <div class="logo"><i class="fa-solid fa-hospital"></i> DOCTOR ADMIN</div>
      <a href="index.html"
        ><i class="fa-solid fa-chart-line me-2"></i> Tổng quan</a
      >
      <a href="doctors.html" class="active"
        ><i class="fa-solid fa-user-doctor me-2"></i> Quản lý Bác sĩ</a
      >
      <a href="patients.html"
        ><i class="fa-solid fa-users me-2"></i> Quản lý Bệnh nhân</a
      >
      <a href="appointments.html"
        ><i class="fa-solid fa-calendar-check me-2"></i> Quản lý Lịch khám</a
      >
      <a href="#" class="mt-5"
        ><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a
      >
    </div>

    <div class="main-content">
      <div
        class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 shadow-sm rounded"
      >
        <h4 class="m-0 font-weight-bold text-primary">Danh Sách Bác Sĩ</h4>
        <button
          class="btn btn-success"
          data-bs-toggle="modal"
          data-bs-target="#addDoctorModal"
        >
          <i class="fas fa-plus"></i> Thêm Bác sĩ mới
        </button>
      </div>

      <div class="card shadow mb-4">
        <div class="card-body">
          <div class="table-responsive">
            <table
              class="table table-bordered table-hover"
              width="100%"
              cellspacing="0"
            >
              <thead class="table-light">
                <tr>
                  <th>Avatar</th>
                  <th>Tên Bác Sĩ</th>
                  <th>Chuyên Khoa</th>
                  <th>Kinh Nghiệm</th>
                  <th>Trạng Thái</th>
                  <th>Thao Tác</th>
                </tr>
              </thead>
              <tbody id="bang-bac-si">
                <tr>
                  <td colspan="6" class="text-center text-muted">
                    Đang tải dữ liệu từ Firebase...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="addDoctorModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">
              <i class="fas fa-user-md me-2"></i>Thêm Hồ Sơ Bác Sĩ Mới
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form id="form-add-doctor">
            <div class="modal-body p-4">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold"
                    >Mã UID Tài Khoản Auth</label
                  >
                  <div class="input-group">
                    <input
                      type="text"
                      id="doc-uid"
                      class="form-control"
                      placeholder="Mã UID 28 ký tự"
                      required
                    />
                    <button
                      class="btn btn-outline-primary"
                      type="button"
                      id="btn-random-uid"
                    >
                      <i class="fas fa-random"></i> Tạo mã
                    </button>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Mã Số ID (Id)</label>
                  <input
                    type="number"
                    id="doc-id"
                    class="form-control"
                    placeholder="Ví dụ: 112"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Họ và Tên Bác Sĩ</label>
                  <input
                    type="text"
                    id="doc-name"
                    class="form-control"
                    placeholder="Nhập họ tên bác sĩ"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Chuyên Khoa</label>
                  <input
                    type="text"
                    id="doc-special"
                    class="form-control"
                    placeholder="Ví dụ: Nha khoa, Nhi khoa"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Số Năm Kinh Nghiệm</label>
                  <input
                    type="number"
                    id="doc-experience"
                    class="form-control"
                    placeholder="Ví dụ: 5"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Giá Khám (VNĐ)</label>
                  <input
                    type="text"
                    id="doc-price"
                    class="form-control"
                    placeholder="Ví dụ: 300.000 VNĐ"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold"
                    >Số Điện Thoại Liên Hệ</label
                  >
                  <input
                    type="text"
                    id="doc-mobile"
                    class="form-control"
                    placeholder="Nhập SĐT bác sĩ"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label fw-bold"
                    >Lịch Làm Việc (Schedule)</label
                  >
                  <input
                    type="text"
                    id="doc-schedule"
                    class="form-control"
                    placeholder="Ví dụ: Thứ 2 - Thứ 6 (8:00 - 17:00)"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label fw-bold"
                    >Đường Dẫn Link Ảnh Thẻ (Picture URL)</label
                  >
                  <input
                    type="url"
                    id="doc-picture"
                    class="form-control"
                    placeholder="Dán link hình ảnh vào đây"
                  />
                </div>
              </div>
            </div>
            <div class="modal-footer bg-light">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Đóng
              </button>
              <button type="submit" class="btn btn-success">
                <i class="fas fa-save me-1"></i>Lưu Vào Firebase
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="admin.js"></script>
  </body>
</html>
