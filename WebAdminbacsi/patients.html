<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Bệnh Nhân - Doctor Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f8f9fc;
        overflow-x: hidden;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #4e73df;
        color: white;
        width: 250px;
      }
      .sidebar a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: bold;
      }
      .sidebar a:hover,
      .sidebar a.active {
        color: white;
        background-color: rgba(255, 255, 255, 0.1);
        border-left: 4px solid #fff;
      }
      .sidebar .logo {
        font-size: 1.2rem;
        font-weight: 900;
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .main-content {
        flex-grow: 1;
        padding: 20px;
      }
    </style>
  </head>
  <body class="d-flex">
    <div class="sidebar d-none d-md-block">
      <div class="logo"><i class="fa-solid fa-hospital"></i> DOCTOR ADMIN</div>
      <a href="index.html"
        ><i class="fa-solid fa-chart-line me-2"></i> Tổng quan</a
      >
      <a href="doctors.html"
        ><i class="fa-solid fa-user-doctor me-2"></i> Quản lý Bác sĩ</a
      >
      <a href="patients.html" class="active"
        ><i class="fa-solid fa-users me-2"></i> Quản lý Bệnh nhân</a
      >
      <a href="appointments.html"
        ><i class="fa-solid fa-calendar-check me-2"></i> Quản lý Lịch khám</a
      >
      <a href="#" class="mt-5"
        ><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a
      >
    </div>

    <div class="main-content">
      <div
        class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 shadow-sm rounded"
      >
        <h4 class="m-0 font-weight-bold text-primary">
          Danh Sách Bệnh Nhân Đăng Ký
        </h4>
      </div>

      <div class="card shadow mb-4">
        <div class="card-body">
          <div class="table-responsive">
            <table
              class="table table-bordered table-hover"
              width="100%"
              cellspacing="0"
            >
              <thead class="table-light">
                <tr>
                  <th>Mã UID</th>
                  <th>Tên Người Dùng</th>
                  <th>Email</th>
                  <th>Thao Tác</th>
                </tr>
              </thead>
              <tbody id="bang-benh-nhan">
                <tr>
                  <td colspan="4" class="text-center text-muted">
                    Đang tải dữ liệu người dùng...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="admin.js"></script>
  </body>
</html>
